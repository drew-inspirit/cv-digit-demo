var STEP3_FX = 64, STEP3_OX = 296;
function step3_featY(i) { return 16 + i*32; }
function step3_ansY(i)  { return 14 + i*30; }

function step3_currentFeatures() {
  var flat = [];
  for (var r=0;r<G;r++) for (var c=0;c<G;c++) flat.push(pixelGrid[r][c]);
  var total = 0;
  for (var t=0;t<flat.length;t++) total += flat[t];
  if (total < 0.5) return null;
  return featuresOf(flatToGrid(preprocessDigit(flat)));
}

function step3_predict() {
  if (!MODEL) modelInit();
  var feats = step3_currentFeatures();
  var empty = !feats;
  var preds = empty ? null : modelForward(feats);
  var winIdx = -1;
  if (!empty) { var mv=-1; for (var i=0;i<10;i++) if (preds[i]>mv){mv=preds[i];winIdx=i;} }
  if (!empty && !step3_hasDrawn) { step3_hasDrawn = true; updateNav(); }
  step3_drawNet(feats, preds, winIdx);
  step3_drawReadout(feats, preds, winIdx, empty);
  step3_maybeReveal(empty);
}

function step3_maybeReveal(empty) {
  var reveal = document.getElementById('step3Reveal');
  if (!reveal || empty || step3_revealed) return;
  if (!step3_trainedFully) return;
  step3_revealed = true;
  reveal.innerHTML = '<div class="reveal"><div class="reveal-title">That is the whole idea</div>'
    + '<div class="reveal-body">Training set all 90 weights on its own, nobody did it by hand. Tap any digit to see <em>its</em> weights, then take the <strong>Quiz</strong>.</div></div>';
}

function step3_drawNet(feats, preds, winIdx) {
  var svg = document.getElementById('step3Net');
  if (!svg) return;
  var html = '';
  // During the walkthrough we zoom into one neuron; otherwise the tapped one,
  // else the winner.
  var focusN = step3_focus >= 0 ? step3_focus
             : (step3_inspect >= 0 ? step3_inspect : winIdx);

  for (var o=0;o<10;o++) {
    var lit = (o === focusN);
    for (var i=0;i<NF;i++) {
      var w = MODEL.W[o][i];
      var thick, color, op;
      if (lit) {
        thick = 1 + Math.min(13, Math.abs(w)*7);
        color = w >= 0 ? '#34d399' : '#f87171';
        op = 0.95;
      } else {
        thick = 0.5 + Math.min(4, Math.abs(w)*2.5);
        color = '#4a4490';
        op = 0.18;
      }
      html += '<line x1="' + (STEP3_FX+13) + '" y1="' + step3_featY(i) + '" x2="' + (STEP3_OX-15) + '" y2="' + step3_ansY(o)
        + '" stroke="' + color + '" stroke-width="' + thick.toFixed(1) + '" stroke-linecap="round" opacity="' + op + '"></line>';
    }
  }
  for (var f=0;f<NF;f++) {
    var fv = feats ? feats[f] : 0;
    var fill = feats && fv > 0.45 ? '#fbbf24' : '#353072';
    var tcol = feats && fv > 0.45 ? '#1e1b4b' : '#b8b3e0';
    html += '<circle cx="' + STEP3_FX + '" cy="' + step3_featY(f) + '" r="11" fill="' + fill + '" stroke="#8a85bd" stroke-width="1.5"></circle>';
    html += '<text x="' + STEP3_FX + '" y="' + (step3_featY(f)+3.5) + '" text-anchor="middle" font-size="9" font-family="Poppins" font-weight="600" fill="' + tcol + '">' + (feats?fv.toFixed(1):'-') + '</text>';
    html += '<text x="' + (STEP3_FX-19) + '" y="' + (step3_featY(f)+3) + '" text-anchor="end" font-size="8" fill="#8a85bd" font-family="DM Sans">' + DETECTORS[f].name + '</text>';
  }
  for (var a=0;a<10;a++) {
    var win = (a === winIdx);
    var foc = (a === focusN);
    var p = preds ? preds[a] : 0;
    var r = 9 + (preds ? p*5 : 0);
    var stroke = win ? '#fbbf24' : (foc ? '#60a5fa' : '#8a85bd');
    var sw = (win||foc) ? 2.5 : 1.5;
    html += '<circle cx="' + STEP3_OX + '" cy="' + step3_ansY(a) + '" r="' + r.toFixed(1) + '" fill="#353072" stroke="' + stroke + '" stroke-width="' + sw + '" style="cursor:pointer" onclick="step3_setInspect(' + a + ')"></circle>';
    html += '<text x="' + STEP3_OX + '" y="' + (step3_ansY(a)+4) + '" text-anchor="middle" font-size="13" font-family="Poppins" font-weight="600" fill="' + (win?'#fbbf24':'#f0eefc') + '" style="cursor:pointer;pointer-events:none">' + a + '</text>';
    if (preds) html += '<text x="' + (STEP3_OX+22) + '" y="' + (step3_ansY(a)+3) + '" text-anchor="start" font-size="8.5" fill="#8a85bd" font-family="DM Sans">' + Math.round(p*100) + '%</text>';
  }
  html += '<text x="' + STEP3_FX + '" y="312" text-anchor="middle" font-size="9" fill="#8a85bd" font-family="DM Sans" font-weight="600">FEATURES</text>';
  html += '<text x="' + STEP3_OX + '" y="312" text-anchor="middle" font-size="9" fill="#8a85bd" font-family="DM Sans" font-weight="600">ANSWER-NEURONS</text>';
  svg.innerHTML = html;
}

function step3_drawReadout(feats, preds, winIdx, empty) {
  var el = document.getElementById('step3Readout');
  if (!el) return;
  if (empty) {
    el.innerHTML = '<div style="padding:10px 12px;background:var(--bg-card2);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text3);text-align:center">Draw a digit to send it through the network</div>';
    return;
  }
  var inspecting = step3_focus >= 0 ? step3_focus
                 : (step3_inspect >= 0 ? step3_inspect : winIdx);
  var conf = Math.round(preds[winIdx]*100);
  var trained = step3_trainedFully;
  var html;
  if (trained) {
    // runner-up: the second-strongest neuron
    var second = -1, secondP = -1;
    for (var d=0;d<10;d++) {
      if (d === winIdx) continue;
      if (preds[d] > secondP) { secondP = preds[d]; second = d; }
    }
    var secondPct = Math.round(secondP*100);
    var close = (preds[winIdx] - secondP) < 0.15;   // top two nearly tied
    html = '<div style="padding:10px 13px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.4);border-radius:10px;text-align:center;min-height:172px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center">'
      + '<div style="font-size:11px;color:var(--text3)">network\'s best guess</div>'
      + '<div style="font-family:Poppins,sans-serif;font-size:30px;font-weight:600;color:var(--gold);line-height:1.1">' + winIdx + '</div>'
      + '<div style="font-size:11px;color:var(--text3)">' + conf + '% confident</div>'
      + '<div style="margin-top:7px;padding-top:7px;border-top:1px solid rgba(251,191,36,0.2);font-size:11px;color:var(--text3)">'
      +   'runner-up: <strong style="color:#93c5fd">' + second + '</strong> at ' + secondPct + '%'
      + '</div>'
      + (close
          ? '<div style="margin-top:7px;padding:7px 10px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.35);border-radius:8px;font-size:10.5px;color:var(--text2);line-height:1.45">Those two are close, the network is genuinely torn. Its features make a ' + winIdx + ' and a ' + second + ' look alike. A bigger network trained on more examples would tell them apart.</div>'
          : '')
      + '</div>';
  } else {
    // untrained: deliberately muted and tagged, so it never looks like a real prediction
    html = '<div style="padding:10px 13px;background:var(--bg-card2);border:1px dashed var(--text3);border-radius:10px;text-align:center">'
      + '<div style="font-size:8.5px;font-weight:700;letter-spacing:0.7px;color:var(--text3);background:rgba(138,133,189,0.18);border-radius:5px;padding:3px 7px;display:inline-block">UNTRAINED NETWORK</div>'
      + '<div style="font-size:10.5px;color:var(--text3);margin-top:6px">random-weight guess</div>'
      + '<div style="font-family:Poppins,sans-serif;font-size:30px;font-weight:600;color:var(--text3);line-height:1.1;opacity:0.7">' + winIdx + '</div>'
      + '<div style="font-size:11px;color:var(--text3)">' + conf + '%, basically a coin flip</div>'
      + '<div style="margin-top:8px;padding:8px 10px;background:rgba(96,165,250,0.14);border:1px solid rgba(96,165,250,0.4);border-radius:8px;font-size:11px;color:var(--text2);line-height:1.45;text-align:left;display:flex;align-items:center;gap:7px">'
      +   '<span style="font-size:14px;flex-shrink:0">&#9755;</span>'
      +   '<span><strong style="color:#93c5fd">Train the network below</strong> to turn this into a real guess.</span>'
      + '</div>'
      + '</div>';
  }
  // The weighted-sum breakdown is collapsed by default; it opens only when the
  // student taps a digit (or the walkthrough zooms into one), so the readout
  // stays short until they ask for the detail.
  if (step3_inspect >= 0 || step3_focus >= 0) {
    var bias = MODEL.b[inspecting];
    var sum = bias;
    var terms = '';
    for (var i=0;i<NF;i++) {
      var w = MODEL.W[inspecting][i];
      var term = w*feats[i];
      sum += term;
      var col = Math.abs(term) < 0.005 ? 'var(--text3)' : (term > 0 ? 'var(--green)' : 'var(--red)');
      var faded = feats[i] < 0.05 ? 'opacity:0.5;' : '';
      terms += '<div style="display:flex;justify-content:space-between;font-size:10.5px;padding:1px 0;' + faded + '">'
        + '<span style="color:var(--text3)">' + DETECTORS[i].name + '</span>'
        + '<span style="color:' + col + ';font-family:Poppins,monospace">' + (term>=0?'+':'') + term.toFixed(2) + '</span></div>';
    }
    var bcol = bias >= 0 ? 'var(--green)' : 'var(--red)';
    terms += '<div style="display:flex;justify-content:space-between;font-size:10.5px;padding:1px 0;font-style:italic">'
      + '<span style="color:var(--text3)">bias (its own knob)</span>'
      + '<span style="color:' + bcol + ';font-family:Poppins,monospace">' + (bias>=0?'+':'') + bias.toFixed(2) + '</span></div>';
    html += '<div style="margin-top:9px;padding:10px 12px;background:var(--bg-card2);border:1px solid var(--border);border-radius:10px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      +   '<span style="font-size:11px;color:var(--blue);font-weight:600">Inside answer-neuron &ldquo;' + inspecting + '&rdquo;</span>'
      +   (step3_inspect >= 0 ? '<span style="font-size:9.5px;color:var(--text3);cursor:pointer" onclick="step3_setInspect(' + inspecting + ')">close &times;</span>' : '')
      + '</div>'
      + terms
      + '<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);font-weight:600">'
      + '<span style="color:var(--text2)">weighted total</span><span style="color:var(--text);font-family:Poppins,monospace">' + sum.toFixed(2) + '</span></div>'
      + '</div>';
  } else {
    html += '<div style="margin-top:9px;padding:9px 12px;background:var(--bg-card2);border:1px dashed var(--border);border-radius:10px;font-size:11px;color:var(--text3);text-align:center;line-height:1.45">Tap a digit on the right to open <strong style="color:var(--text2)">its</strong> weighted sum.</div>';
  }
  el.innerHTML = html;
}

function step3_setInspect(a) {
  if (step3_animating) return;
  step3_inspect = (step3_inspect === a) ? -1 : a;
  step3_predict();
}

// ----- the error curve -----
function step3_drawCurve() {
  var svg = document.getElementById('step3Curve');
  if (!svg) return;
  var stepsEl = document.getElementById('step3CurveSteps');
  if (step3_history.length < 1) { svg.innerHTML = ''; if (stepsEl) stepsEl.textContent = ''; return; }
  var W = 460, H = 78, padL = 46, padR = 14, padT = 8, padB = 16;
  var maxLoss = 0.7;
  for (var m=0;m<step3_history.length;m++) if (step3_history[m].loss > maxLoss) maxLoss = step3_history[m].loss;
  var n = step3_history.length;
  var plotW = W-padL-padR, plotH = H-padT-padB;
  function xc(i) { return padL + (n<=1?plotW*0.5:i/(n-1)*plotW); }
  function yc(l) { return padT + (1 - l/maxLoss)*plotH; }
  var last = step3_history[n-1];
  var stepWord = step3_iter === 1 ? 'step' : 'steps';
  if (stepsEl) stepsEl.textContent = step3_iter + ' ' + stepWord + ' trained';

  var html = '<rect x="' + padL + '" y="' + padT + '" width="' + plotW + '" height="' + plotH + '" fill="#1e1b4b" rx="3"></rect>';
  // y-axis labels: high error at top, low at bottom
  html += '<text x="' + (padL-6) + '" y="' + (padT+8) + '" text-anchor="end" font-size="8" fill="#8a85bd" font-family="DM Sans">more</text>';
  html += '<text x="' + (padL-6) + '" y="' + (padT+16) + '" text-anchor="end" font-size="8" fill="#8a85bd" font-family="DM Sans">wrong</text>';
  html += '<text x="' + (padL-6) + '" y="' + (padT+plotH-2) + '" text-anchor="end" font-size="8" fill="#8a85bd" font-family="DM Sans">less</text>';

  if (n === 1) {
    var cx = xc(0), cy = yc(last.loss);
    html += '<line x1="' + padL + '" y1="' + cy.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + cy.toFixed(1) + '" stroke="#f87171" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"></line>';
    html += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="4" fill="#f87171"></circle>';
    html += '<text x="' + cx.toFixed(1) + '" y="' + (cy-8).toFixed(1) + '" text-anchor="middle" font-size="9" fill="#f0eefc" font-family="Poppins" font-weight="600">' + last.loss.toFixed(2) + '</text>';
    html += '<text x="' + (padL+plotW*0.5).toFixed(1) + '" y="' + (padT+plotH-5) + '" text-anchor="middle" font-size="8.5" fill="#8a85bd" font-family="DM Sans">walk a few more steps to see it fall</text>';
  } else {
    var path = '';
    for (var i=0;i<step3_history.length;i++) {
      path += (i===0?'M':'L') + ' ' + xc(i).toFixed(1) + ' ' + yc(step3_history[i].loss).toFixed(1);
    }
    html += '<path d="' + path + '" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>';
    html += '<circle cx="' + xc(0).toFixed(1) + '" cy="' + yc(step3_history[0].loss).toFixed(1) + '" r="3" fill="#8a85bd"></circle>';
    html += '<circle cx="' + xc(n-1).toFixed(1) + '" cy="' + yc(last.loss).toFixed(1) + '" r="3.5" fill="#f87171"></circle>';
    html += '<text x="' + (xc(n-1)-6).toFixed(1) + '" y="' + (yc(last.loss)+3).toFixed(1) + '" text-anchor="end" font-size="9" fill="#f0eefc" font-family="Poppins" font-weight="600">' + last.loss.toFixed(2) + '</text>';
  }
  svg.innerHTML = html;
}

// ----- beat indicator -----
function step3_renderBeatBar() {
  var bar = document.getElementById('step3BeatBar');
  if (!bar) return;
  var html = '';
  for (var i=0;i<STEP3_BEATS.length;i++) {
    var done = step3_beat > i+1 || (step3_beat === i+1);
    var active = step3_beat === i+1;
    var col = done ? STEP3_BEATS[i].color : 'var(--border)';
    var key = STEP3_BEATS[i].key;
    if (i === 1 && step3_walkExample && step3_walkGuess === step3_walkExample.label) {
      key = 'Right answer';
      if (done) col = '#34d399';
    }
    html += '<div style="flex:1;text-align:center">'
      + '<div style="height:4px;border-radius:99px;background:' + col + ';opacity:' + (done?1:0.4) + ';transition:all 0.3s"></div>'
      + '<div style="font-size:8.5px;margin-top:3px;color:' + (active?(i===1&&step3_walkExample&&step3_walkGuess===step3_walkExample.label?'#34d399':STEP3_BEATS[i].color):'var(--text3)') + ';font-weight:' + (active?600:400) + '">' + key + '</div>'
      + '</div>';
  }
  bar.innerHTML = html;
}

function step3_setCaption(html) {
  var cap = document.getElementById('step3Caption');
  if (cap) cap.innerHTML = '<span>' + html + '</span>';
}

// ----- the slow-motion walkthrough, on the student's own digit -----
// The student draws a digit and tells the network which digit it is. The
// walkthrough then runs one real learning step on THAT example: forward pass,
// the network's guess, the error against the student's label, one gradient
// nudge, and the improved confidence.

// Entry point from the "Walk one learning step" button.
function step3_walk() {
  if (step3_animating) return;
  // Need a digit on the canvas first.
  var feats = step3_currentFeatures();
  if (!feats) {
    step3_setCaption('<strong style="color:var(--gold)">Draw a digit first.</strong> Use the pad above, then come back and walk it through one learning step.');
    return;
  }
  if (step3_beat >= 5) step3_beat = 0;   // finished a step -> start fresh
  if (step3_beat === 0) {
    // ask the student to label their drawing
    step3_showLabelPicker();
    return;
  }
  // beats 1-5 advance via step3_runBeat
  step3_runBeat();
}

// Show 0-9 buttons in the caption area; the pick kicks off the beats.
function step3_showLabelPicker() {
  step3_awaitingLabel = true;
  step3_renderBeatBar();
  var btns = '';
  for (var d=0;d<10;d++) {
    btns += '<button onclick="step3_pickLabel(' + d + ')" style="width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-family:Poppins,sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor=\'var(--gold)\';this.style.color=\'var(--gold)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--text)\'">' + d + '</button>';
  }
  var cap = document.getElementById('step3Caption');
  if (cap) {
    cap.innerHTML = '<div><div style="margin-bottom:9px;color:var(--text2)">Which digit did you draw? Tell the network the right answer, that is the label it learns from.</div>'
      + '<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">' + btns + '</div></div>';
  }
  var wb = document.getElementById('step3WalkBtn');
  if (wb) wb.disabled = true;
}

// Student picked their label -> capture their digit and start beat 1.
function step3_pickLabel(label) {
  if (step3_animating) return;
  var feats = step3_currentFeatures();
  if (!feats) { step3_awaitingLabel = false; step3_walk(); return; }
  step3_awaitingLabel = false;
  var preds = modelForward(feats);
  var guess = 0;
  for (var d=1;d<10;d++) if (preds[d]>preds[guess]) guess=d;
  step3_walkExample = { feats: feats, label: label };
  step3_walkGuess = guess;
  step3_beat = 0;
  var wb = document.getElementById('step3WalkBtn');
  if (wb) wb.disabled = false;
  step3_runBeat();
}

// Advance one beat of the walkthrough.
function step3_runBeat() {
  step3_beat++;
  step3_renderBeatBar();
  var ex = step3_walkExample;
  var label = ex.label;
  var guess = step3_walkGuess;
  var correct = (guess === label);
  var preds = modelForward(ex.feats);

  if (step3_beat === 1) {
    step3_focus = label;
    // a fresh walk is underway: walk button leads, train steps back
    var wb1 = document.getElementById('step3WalkBtn');
    if (wb1) wb1.className = 'btn btn-primary';
    var tb1 = document.getElementById('step3TrainBtn');
    if (tb1) tb1.className = 'btn btn-ghost';
    step3_setCaption('<strong style="color:var(--gold)">Forward pass.</strong> The 9 features of <em>your</em> digit flow along the wires into all 10 answer-neurons. Each one adds up its weighted features.');
  } else if (step3_beat === 2) {
    step3_focus = guess;
    if (correct) {
      step3_setCaption('<strong style="color:var(--green)">Right answer.</strong> The loudest neuron is <strong style="color:var(--text)">' + guess + '</strong>, and you said this is a <strong style="color:var(--text)">' + label + '</strong>. The network got it right, but it can still be made more sure.');
    } else {
      step3_setCaption('<strong style="color:var(--red)">Wrong answer.</strong> The loudest neuron is <strong style="color:var(--text)">' + guess + '</strong>, but you said this is a <strong style="color:var(--text)">' + label + '</strong>. The network is wrong.');
    }
  } else if (step3_beat === 3) {
    step3_focus = label;
    var got = Math.round(preds[label]*100);
    step3_setCaption('<strong style="color:var(--red)">Measure the error.</strong> Neuron <strong style="color:var(--text)">' + label + '</strong> should fire hardest, it should be near 100%, but it is only at <strong style="color:var(--text)">' + got + '%</strong>. That gap is the error to fix.');
  } else if (step3_beat === 4) {
    step3_focus = label;
    step3_walkBefore = preds[label];
    step3_setCaption('<strong style="color:var(--gold)">Nudge the weights.</strong> Every wire into neuron <strong style="color:var(--text)">' + label + '</strong> shifts a little, so your digit pushes that neuron higher next time. Watch the wires change.');
    step3_animating = true;
    step3_disableTrainBtns(true);
    modelTrainOne(ex.feats, label);   // one real gradient step on the student's example
    step3_sound('nudge');
    step3_iter++;
    var mm = modelMetrics();
    step3_history.push({ iter: step3_iter, loss: mm.loss });
    step3_animateFocusWires(function(){
      step3_animating = false;
      step3_disableTrainBtns(false);
      step3_drawCurve();
      var cv = document.getElementById('step3CurveWrap');
      if (cv) cv.style.opacity = '1';
    });
    step3_predict();
    return;
  } else if (step3_beat === 5) {
    step3_focus = label;
    var after = modelForward(ex.feats)[label];
    var b4 = Math.round((step3_walkBefore||0)*100);
    var af = Math.round(after*100);
    step3_setCaption('<strong style="color:var(--green)">A bit better.</strong> Neuron ' + label + ' went from <strong style="color:var(--text)">' + b4 + '%</strong> to <strong style="color:var(--green)">' + af + '%</strong> on your digit. One small nudge. Real training repeats this thousands of times, <strong style="color:var(--text)">Train it fully</strong> does exactly that.');
    var wb = document.getElementById('step3WalkBtn');
    if (wb) { wb.textContent = 'Walk another digit'; wb.className = 'btn btn-ghost'; }
    var tb = document.getElementById('step3TrainBtn');
    if (tb) tb.className = 'btn btn-primary';
  }
  step3_predict();
}
var step3_walkBefore = 0;

// briefly pulse the focused neuron's wires to draw the eye to the change
function step3_animateFocusWires(onDone) {
  var svg = document.getElementById('step3Net');
  if (!svg) { if (onDone) onDone(); return; }
  var flashes = 0;
  function flash() {
    var lines = svg.getElementsByTagName('line');
    flashes++;
    step3_predict();   // redraw with current weights
    if (flashes < 4) setTimeout(flash, 130);
    else if (onDone) onDone();
  }
  flash();
}

function step3_disableTrainBtns(disabled) {
  var w = document.getElementById('step3WalkBtn');
  var t = document.getElementById('step3TrainBtn');
  if (w) w.disabled = disabled;
  if (t) t.disabled = disabled;
}

// ----- train fully: run the loop to convergence, animating all 90 wires -----
function step3_trainFully() {
  if (step3_animating) return;
  step3_animating = true;
  step3_focus = -1;            // show all wires
  step3_beat = 0;
  step3_renderBeatBar();
  step3_disableTrainBtns(true);
  step3_setCaption('<strong style="color:var(--gold)">Training.</strong> Running the loop across the whole network, every wire adjusting at once.');
  var hint = document.getElementById('step3NetHint');
  if (hint) hint.textContent = 'all 90 weights adjusting';
  var cv = document.getElementById('step3CurveWrap');
  if (cv) cv.style.opacity = '1';
  var frames = 50, perFrame = 7, done = 0;
  function tick() {
    for (var e=0;e<perFrame;e++) { modelTrainEpoch(); step3_iter++; }
    var mm = modelMetrics();
    step3_history.push({ iter: step3_iter, loss: mm.loss });
    step3_predict();
    step3_drawCurve();
    done++;
    if (done < frames) {
      setTimeout(tick, 38);
    } else {
      MODEL_TRAINED = true;
      step3_trainedFully = true;
      step3_sound('trained');
      step3_animating = false;
      step3_disableTrainBtns(false);
      var m2 = modelMetrics();
      step3_setCaption('<strong style="color:var(--green)">Trained.</strong> The wires now carry what it learned, it gets <strong style="color:var(--green)">' + Math.round(m2.acc*100) + '%</strong> of its practice digits right. Draw above to test it. It is a tiny network, so a messy digit can still fool it, real ones train on far more examples.');
      if (hint) hint.textContent = 'tap any digit to see its 9 weights';
      var wb = document.getElementById('step3WalkBtn');
      if (wb) wb.disabled = true;
      step3_revealed = false;
      step3_predict();
    }
  }
  tick();
}

function step3_canAdvance() { return step3_hasDrawn; }
// Drawing fires onChange on every pointer move. Re-rendering the 90-wire SVG
// that often causes layout thrash, so coalesce predictions to one per frame.
var step3_predictQueued = false;
function step3_predictThrottled() {
  if (step3_predictQueued) return;
  step3_predictQueued = true;
  requestAnimationFrame(function(){
    step3_predictQueued = false;
    step3_predict();
  });
}
function step3_post() {
  initDrawCanvas('drawCanvas', step3_predictThrottled);
  if (!MODEL) modelInit();
  var total = 0;
  for (var r=0;r<G;r++) for (var c=0;c<G;c++) total += pixelGrid[r][c];
  if (total > 3) step3_hasDrawn = true;
  step3_renderBeatBar();
  step3_drawCurve();
  if (step3_trainedFully) {
    var cv = document.getElementById('step3CurveWrap');
    if (cv) cv.style.opacity = '1';
    var wb = document.getElementById('step3WalkBtn');
    if (wb) wb.disabled = true;
    var hint = document.getElementById('step3NetHint');
    if (hint) hint.textContent = 'tap any digit to see its 9 weights';
  }
  step3_predict();
  updateNav();
}

// ============================================================
// STEP 4 - quiz
// ============================================================
var step4_quizIdx = 0;
var step4_quizDone = false;

var STEP4_QUIZ = [
  { q: 'A network sees a drawing. What does it actually receive?',
    options: ['The shape of the digit','A grid of pixel numbers','The name of the digit'], correct: 1,
    why: 'A network has no eyes, only numbers. The drawing reaches it as a grid of brightness values, 0 to 255.' },
  { q: 'What does a feature detector do?',
    options: ['Stores the final answer','Responds to one kind of shape in the image','Picks the winning digit'], correct: 1,
    why: 'Each detector is a small neuron tuned to one pattern, a line or a loop, and fires when it spots that pattern.' },
  { q: 'A network guesses wrong. What changes during training?',
    options: ['The pixels in the image','The weights on the connections','The number of neurons'], correct: 1,
    why: 'Training only nudges the weights. The image, the features, and the network shape all stay the same.' }
];

function renderStep4() {
  return ''
    + '<div class="step-header">'
    +   '<div class="step-title">Quick <em>check</em></div>'
    +   '<div class="step-prompt">Three quick questions on what you just explored. Answer each to finish.</div>'
    + '</div>'
    + '<div id="step4Reveal"></div>';
}

function step4_renderQuiz() {
  var reveal = document.getElementById('step4Reveal');
  if (!reveal) return;
  if (step4_quizIdx >= STEP4_QUIZ.length) {
    step4_quizDone = true;
    reveal.innerHTML = '<div class="celebration">'
      + '<div class="celebration-title">You\'ve explored computer vision end-to-end!</div>'
      + '<div class="celebration-text">Pixels become features, features become a weighted vote, and training tunes the weights until the votes are right. That is how a neural network reads handwriting.</div>'
      + '</div>';
    updateNav();
    return;
  }
  var item = STEP4_QUIZ[step4_quizIdx];
  var opts = '';
  for (var i=0;i<item.options.length;i++) {
    opts += '<button class="quiz-opt" onclick="step4_answerQuiz(' + i + ')" style="text-align:left;padding:9px 13px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card2);color:var(--text2);font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s">' + item.options[i] + '</button>';
  }
  reveal.innerHTML = '<div class="reveal gold" style="margin-top:4px">'
    + '<div class="reveal-title">Question ' + (step4_quizIdx+1) + ' of ' + STEP4_QUIZ.length + '</div>'
    + '<div class="reveal-body" style="margin-bottom:10px">' + item.q + '</div>'
    + '<div id="step4QuizOpts" style="display:flex;flex-direction:column;gap:7px">' + opts + '</div>'
    + '<div id="step4QuizFeedback"></div>'
    + '</div>';
}

function step4_answerQuiz(choice) {
  var item = STEP4_QUIZ[step4_quizIdx];
  var opts = document.getElementById('step4QuizOpts');
  if (!opts) return;
  var right = (choice === item.correct);
  for (var i=0;i<opts.children.length;i++) {
    var btn = opts.children[i];
    btn.disabled = true;
    btn.style.cursor = 'default';
    if (i === item.correct) {
      btn.style.borderColor = 'var(--green)';
      btn.style.background = 'rgba(52,211,153,0.14)';
      btn.style.color = 'var(--green)';
    } else if (i === choice) {
      btn.style.borderColor = 'var(--red)';
      btn.style.background = 'rgba(248,113,113,0.14)';
      btn.style.color = 'var(--red)';
    } else {
      btn.style.opacity = '0.5';
    }
  }
  step4_sound(right ? 'right' : 'wrong');
  var fb = document.getElementById('step4QuizFeedback');
  var last = step4_quizIdx === STEP4_QUIZ.length-1;
  if (fb) {
    var head = right
      ? '<span style="color:var(--green);font-weight:600">Correct.</span> '
      : '<span style="color:var(--red);font-weight:600">Not quite.</span> ';
    fb.innerHTML = '<div style="margin-top:11px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.5">'
      + head + item.why + '</div>'
      + '<div style="text-align:right;margin-top:9px">'
      + '<button class="btn btn-primary" onclick="step4_nextQuiz()" style="padding:7px 16px;font-size:12px">' + (last ? 'See the recap' : 'Next question') + '</button>'
      + '</div>';
  }
}
function step4_nextQuiz() {
  step4_quizIdx++;
  step4_renderQuiz();
}

function step4_canAdvance() { return step4_quizDone; }
function step4_post() {
  if (!step4_quizDone) step4_quizIdx = 0;
  step4_renderQuiz();
  updateNav();
}
// ============================================================
var STEPS = [
  { label: 'Pixels',   render: renderStep1, post: step1_post, canAdvance: step1_canAdvance },
  { label: 'Features', render: renderStep2, post: step2_post, canAdvance: step2_canAdvance },
  { label: 'Network',  render: renderStep3, post: step3_post, canAdvance: step3_canAdvance },
  { label: 'Quiz',     render: renderStep4, post: step4_post, canAdvance: step4_canAdvance }
];
var stepIdx = 0;
var maxReached = 0;

function renderRail() {
  var rail = document.getElementById('stepRail');
  var html = '';
  for (var i=0;i<STEPS.length;i++) {
    var done = i < stepIdx;
    var active = i === stepIdx;
    var clickable = i <= maxReached;
    var cls = (active?'active ':'') + (done?'done ':'') + (clickable?'clickable':'');
    html += '<div class="rail-node ' + cls + '" ' + (clickable?('onclick="jumpToStep(' + i + ')"'):'') + '>'
      + '<div class="rail-dot">' + (i+1) + '</div>'
      + '<div class="rail-label">' + STEPS[i].label + '</div>'
      + '</div>';
    if (i < STEPS.length-1) html += '<div class="rail-line ' + (done?'done':'') + '"></div>';
  }
  rail.innerHTML = html;
}
function render() {
  renderRail();
  var s = STEPS[stepIdx];
  var body = document.getElementById('cardBody');
  body.style.opacity = '0';
  body.style.transform = 'translateY(8px)';
  setTimeout(function(){
    body.innerHTML = s.render();
    body.style.transition = 'opacity 0.24s, transform 0.24s';
    body.style.opacity = '1';
    body.style.transform = 'translateY(0)';
    if (s.post) setTimeout(s.post, 30);
    updateNav();
  }, 120);
}
function updateNav() {
  var s = STEPS[stepIdx];
  document.getElementById('navMeta').textContent = 'Step ' + (stepIdx+1) + ' of ' + STEPS.length;
  document.getElementById('prevBtn').disabled = stepIdx === 0;
  var nextBtn = document.getElementById('nextBtn');
  var isLast = stepIdx === STEPS.length-1;
  var can = s.canAdvance ? s.canAdvance() : true;
  if (isLast) {
    nextBtn.textContent = can ? 'Complete' : 'Finish to complete';
    nextBtn.disabled = true;
  } else {
    nextBtn.disabled = !can;
    nextBtn.textContent = can ? 'Continue' : 'Finish this step';
  }
}
function resetStepState(i) {
  if (i === 0) { pixelGrid = makeGrid(); step1_hasDrawn = false; }
  else if (i === 1) { step2_seen = false; }
  else if (i === 2) { step3_hasDrawn = false; }
  else if (i === 3) { if (!step4_quizDone) step4_quizIdx = 0; }
}
function nextStep() {
  if (stepIdx < STEPS.length-1) {
    stepIdx++;
    if (stepIdx > maxReached) maxReached = stepIdx;
    resetStepState(stepIdx);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function prevStep() {
  if (stepIdx > 0) { stepIdx--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}
function jumpToStep(i) {
  if (i > maxReached || i === stepIdx) return;
  stepIdx = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.setDrawMode = setDrawMode;
window.clearDrawing = clearDrawing;
window.nextStep = nextStep;
window.prevStep = prevStep;
window.jumpToStep = jumpToStep;
window.step4_answerQuiz = step4_answerQuiz;
window.step4_nextQuiz = step4_nextQuiz;
window.toggleSound = toggleSound;
window.step3_setInspect = step3_setInspect;
window.step3_walk = step3_walk;
window.step3_pickLabel = step3_pickLabel;
window.step3_trainFully = step3_trainFully;
window.step2_toggleConv = step2_toggleConv;
window.step2_convStep = step2_convStep;
window.step2_convAuto = step2_convAuto;
window.step2_highlight = step2_highlight;
window.step2_clearHighlight = step2_clearHighlight;
window.step2_toggleHighlight = step2_toggleHighlight;

render();
</script>
</body>
</html>
